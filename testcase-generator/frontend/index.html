<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI测试用例生成器</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🤖 AI测试用例生成器</h1>
            <p class="subtitle">基于需求文档和UI图生成结构化测试用例 (.xlsx)</p>
        </header>

        <main>
            <section class="upload-section">
                <h2>📤 上传需求文档</h2>

                <div class="upload-area" id="uploadArea">
                    <div class="upload-content">
                        <div class="upload-icon">📄</div>
                        <p>拖拽文件到此处，或 <label for="fileInput" class="upload-link">点击上传</label></p>
                        <p class="upload-hint">支持 .docx, .txt, .md 格式</p>
                        <input type="file" id="fileInput" accept=".docx,.txt,.md" style="display:none;">
                    </div>
                </div>

                <div class="uploaded-file" id="uploadedFile" style="display:none;">
                    <span class="file-icon">📄</span>
                    <span class="file-name" id="fileName"></span>
                    <button class="btn-remove" onclick="removeFile()">✕</button>
                </div>

                <h3>📸 上传UI图片（可选）</h3>
                <div class="upload-area" id="imageUploadArea">
                    <div class="upload-content">
                        <div class="upload-icon">🖼️</div>
                        <p>拖拽图片到此处，或 <label for="imageInput" class="upload-link">点击上传</label></p>
                        <p class="upload-hint">支持 .jpg, .png 格式</p>
                        <input type="file" id="imageInput" accept=".jpg,.png" multiple style="display:none;">
                    </div>
                </div>

                <div class="image-preview" id="imagePreview" style="display:none;">
                    <div class="image-list" id="imageList"></div>
                </div>
            </section>

            <section class="action-section">
                <button class="btn btn-primary btn-large" id="generateBtn" onclick="generateTestCases()" disabled>
                    🎯 生成测试用例
                </button>
            </section>

            <section class="result-section" id="resultSection" style="display:none;">
                <h2>✅ 测试用例已生成</h2>
                <div class="result-info">
                    <p>共生成 <span id="caseCount">0</span> 条测试用例</p>
                    <a class="btn btn-download" id="downloadLink" href="#" download>
                        📥 下载测试用例.xlsx
                    </a>
                </div>
            </section>

            <section class="loading-section" id="loadingSection" style="display:none;">
                <div class="loading-spinner"></div>
                <p>正在调用AI生成测试用例，请稍候...</p>
            </section>

            <section class="error-section" id="errorSection" style="display:none;">
                <div class="error-message">
                    <span class="error-icon">❌</span>
                    <p id="errorText"></p>
                </div>
            </section>
        </main>

        <footer>
            <p>基于火山引擎大模型驱动 | 输出格式: .xlsx</p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
