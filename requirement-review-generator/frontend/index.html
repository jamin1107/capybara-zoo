<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 需求评审工具</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <div class="page-header">
            <h1>📋 AI 需求评审工具</h1>
            <p class="subtitle">上传需求文档，AI自动分析并生成评审报告</p>
        </div>

        <div class="form-container" id="review-mode">
            <div class="form-section" id="review-upload-section">
                <h2>📄 上传待评审的需求文档</h2>
                <div class="upload-area" id="review-upload-area">
                    <div class="upload-content">
                        <div class="upload-icon">📤</div>
                        <p class="upload-text">拖拽 .docx 文件到此处，或 <span class="browse-btn">浏览文件</span></p>
                        <p class="upload-hint">支持 .docx 格式的需求文档</p>
                    </div>
                    <input type="file" id="review-file-input" accept=".docx" hidden>
                </div>
                <div class="file-list active" id="review-file-list" style="margin-top: 16px;">
                    <div class="file-list-header">
                        <span>已上传: <span id="review-file-name">未选择文件</span></span>
                        <button class="btn-text" onclick="clearReviewFile()">移除</button>
                    </div>
                </div>
                <div class="action-section" style="margin-top: 24px;">
                    <button class="btn btn-primary btn-large" onclick="analyzeDocument()" id="analyze-btn" disabled>
                        <span class="icon">🤖</span> AI 评审分析
                    </button>
                </div>
            </div>

            <div class="form-section" id="review-result-section" style="display: none;">
                <h2>📊 AI 评审结果 <span id="issue-count" style="color: #11998e;">0</span> 个问题点</h2>

                <div class="review-points-container" id="review-points-container"></div>

                <div class="action-row">
                    <button class="btn btn-outline" onclick="addReviewPoint()">
                        <span class="icon">➕</span> 新增评审点
                    </button>
                    <button class="btn btn-primary" onclick="confirmReview()" id="confirm-review-btn">
                        <span class="icon">✅</span> 确认评审，生成修改文档
                    </button>
                </div>
            </div>

            <div class="progress-section" id="review-progress" style="display: none;">
                <h2>🔄 处理进度</h2>
                <div class="progress-steps">
                    <div class="progress-step" id="r-step-upload">
                        <div class="step-icon">1</div>
                        <div class="step-info">
                            <div class="step-title">上传文档</div>
                            <div class="step-status">等待中</div>
                        </div>
                    </div>
                    <div class="progress-step" id="r-step-analyze">
                        <div class="step-icon">2</div>
                        <div class="step-info">
                            <div class="step-title">AI评审</div>
                            <div class="step-status">等待中</div>
                        </div>
                    </div>
                    <div class="progress-step" id="r-step-modify">
                        <div class="step-icon">3</div>
                        <div class="step-info">
                            <div class="step-title">修改文档</div>
                            <div class="step-status">等待中</div>
                        </div>
                    </div>
                    <div class="progress-step" id="r-step-generate">
                        <div class="step-icon">4</div>
                        <div class="step-info">
                            <div class="step-title">生成文档</div>
                            <div class="step-status">等待中</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="result-section" class="result-section" style="display: none;">
            <div class="result-card">
                <div class="result-icon">✅</div>
                <h3 id="result-title">需求文档评审完成！</h3>
                <p id="result-desc">已根据评审点生成修改后的文档，修改内容用红色字体标注</p>
                <div class="result-info">
                    <div class="info-item">
                        <span class="info-label">生成时间：</span>
                        <span class="info-value" id="result-time"></span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">文件大小：</span>
                        <span class="info-value" id="result-size"></span>
                    </div>
                </div>
                <a id="download-link" class="btn btn-success" download>
                    <span class="icon">📥</span> 下载评审文档
                </a>
                <button class="btn btn-outline" onclick="resetPage()">
                    <span class="icon">🔄</span> 继续评审新需求
                </button>
            </div>
        </div>

        <div id="error-section" class="error-section" style="display: none;">
            <div class="error-card">
                <div class="error-icon">❌</div>
                <h3>处理失败</h3>
                <p id="error-message"></p>
                <button class="btn btn-outline" onclick="resetPage()">
                    <span class="icon">🔄</span> 重试
                </button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
