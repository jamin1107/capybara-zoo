<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI双图融合</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <!-- 首页 -->
        <div id="home-page" class="page active">
            <div class="header">
                <button class="back-btn" style="visibility: hidden;">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                        <path d="M15 18L9 12L15 6" stroke="#333" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
                <h1>AI双图融合</h1>
                <div style="width: 40px;"></div>
            </div>
            
            <div class="content">
                <div class="image-cards">
                    <div class="image-card" id="slot-1-card" onclick="triggerUpload(1)">
                        <input type="file" id="slot-1-upload" accept="image/*" style="display: none;" onchange="handleFileUpload(event, 1)">
                        <div class="placeholder" id="slot-1-placeholder">
                            <div class="icon">
                                <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
                                    <rect x="8" y="12" width="48" height="40" rx="4" fill="#fff"/>
                                    <circle cx="24" cy="28" r="8" fill="#FFB6C1"/>
                                    <rect x="30" y="36" width="20" height="8" rx="2" fill="#FFB6C1"/>
                                    <circle cx="48" cy="20" r="4" fill="#fff" stroke="#FFB6C1" stroke-width="2"/>
                                </svg>
                            </div>
                            <p class="text">选择人物/内容</p>
                            <p class="subtext">点击上传本地图片</p>
                        </div>
                        <img id="slot-1-image" class="selected-image" style="display: none;">
                    </div>
                    
                    <div class="plus-icon">+</div>
                    
                    <div class="image-card" id="slot-2-card" onclick="triggerUpload(2)">
                        <input type="file" id="slot-2-upload" accept="image/*" style="display: none;" onchange="handleFileUpload(event, 2)">
                        <div class="placeholder" id="slot-2-placeholder">
                            <div class="icon">
                                <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
                                    <rect x="8" y="12" width="48" height="40" rx="4" fill="#fff"/>
                                    <circle cx="24" cy="28" r="8" fill="#FFB6C1"/>
                                    <rect x="30" y="36" width="20" height="8" rx="2" fill="#FFB6C1"/>
                                    <circle cx="48" cy="20" r="4" fill="#fff" stroke="#FFB6C1" stroke-width="2"/>
                                </svg>
                            </div>
                            <p class="text">选择人物/内容</p>
                            <p class="subtext">点击上传本地图片</p>
                        </div>
                        <img id="slot-2-image" class="selected-image" style="display: none;">
                    </div>
                </div>
                
                <div class="description">
                    <p>运用AI技术把两个不同维度的人与物合二为一，</p>
                    <p>让想法变成可能</p>
                </div>
                
                <button class="fuse-btn" id="fuse-btn" onclick="startFusion()" disabled>
                    <span class="magic-icon">✨</span>
                    开始魔法融合
                </button>
            </div>
        </div>
        
        <!-- 图片选择页面 -->
        <div id="select-page" class="page">
            <div class="header">
                <button class="back-btn" onclick="goBack()">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                        <path d="M15 18L9 12L15 6" stroke="#333" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
                <h1>图片</h1>
                <button class="confirm-btn" onclick="confirmImage()">确定</button>
            </div>
            
            <div class="content">
                <div class="image-grid">
                    <div class="grid-item" onclick="chooseImage(1)"></div>
                    <div class="grid-item" onclick="chooseImage(2)"></div>
                    <div class="grid-item" onclick="chooseImage(3)"></div>
                    <div class="grid-item" onclick="chooseImage(4)"></div>
                    <div class="grid-item" onclick="chooseImage(5)"></div>
                    <div class="grid-item" onclick="chooseImage(6)"></div>
                    <div class="grid-item" onclick="chooseImage(7)"></div>
                    <div class="grid-item" onclick="chooseImage(8)"></div>
                    <div class="grid-item" onclick="chooseImage(9)"></div>
                    <div class="grid-item" onclick="chooseImage(10)"></div>
                    <div class="grid-item" onclick="chooseImage(11)"></div>
                    <div class="grid-item" onclick="chooseImage(12)"></div>
                    <div class="grid-item" onclick="chooseImage(13)"></div>
                    <div class="grid-item" onclick="chooseImage(14)"></div>
                    <div class="grid-item" onclick="chooseImage(15)"></div>
                </div>
            </div>
        </div>
        
        <!-- 融合中页面 -->
        <div id="fusing-page" class="page">
            <div class="header">
                <button class="back-btn" onclick="goBack()">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                        <path d="M15 18L9 12L15 6" stroke="#333" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
                <h1>AI双图融合</h1>
                <div style="width: 40px;"></div>
            </div>
            
            <div class="content">
                <div class="fusing-images">
                    <img id="fusing-first" class="fusing-image">
                    <div class="fusing-plus">✦</div>
                    <img id="fusing-second" class="fusing-image">
                </div>
                
                <div class="fusing-text">
                    <h2>正在识别面部特征，保持美丽...</h2>
                    <p>AI正在为您的创意注入灵感</p>
                </div>
                
                <div class="progress-container">
                    <svg class="progress-ring" width="200" height="200">
                        <circle class="progress-bg" cx="100" cy="100" r="90"></circle>
                        <circle class="progress-bar" cx="100" cy="100" r="90" id="progress-circle"></circle>
                    </svg>
                    <div class="progress-text">
                        <span id="progress-percent">0</span>%
                        <p>PROCESSING</p>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 融合完成页面 -->
        <div id="result-page" class="page">
            <div class="header">
                <button class="back-btn" onclick="goBack()">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                        <path d="M15 18L9 12L15 6" stroke="#333" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
                <h1>AI双图融合</h1>
                <div style="width: 40px;"></div>
            </div>
            
            <div class="content">
                <div class="result-image-container">
                    <div class="result-placeholder"></div>
                    <img id="result-image" class="result-image" style="display: none;">
                </div>
                
                <div class="result-buttons">
                    <button class="print-btn" onclick="goToEdit()">
                        打印照片
                    </button>
                    <button class="save-btn" onclick="saveToLocal()">
                        保存到本地
                    </button>
                    <button class="regenerate-btn" onclick="regenerate()">
                        重新生成
                    </button>
                </div>
            </div>
        </div>
        
        <!-- 图片编辑页面 -->
        <div id="edit-page" class="page">
            <div class="header">
                <button class="back-btn" onclick="goBack()">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                        <path d="M15 18L9 12L15 6" stroke="#333" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
                <h1>图片编辑</h1>
                <button class="confirm-btn" onclick="goToPreview()">完成</button>
            </div>
            
            <div class="content">
                <div class="edit-image-container">
                    <img id="edit-image" class="edit-image">
                </div>
                
                <div class="edit-controls">
                    <div class="edit-control-item">
                        <label>亮度</label>
                        <input type="range" id="brightness-range" min="0" max="200" value="100" oninput="updateEdit()">
                    </div>
                    <div class="edit-control-item">
                        <label>对比度</label>
                        <input type="range" id="contrast-range" min="0" max="200" value="100" oninput="updateEdit()">
                    </div>
                    <div class="edit-control-item">
                        <label>饱和度</label>
                        <input type="range" id="saturation-range" min="0" max="200" value="100" oninput="updateEdit()">
                    </div>
                    <div class="edit-control-item">
                        <label>旋转</label>
                        <input type="range" id="rotate-range" min="0" max="360" value="0" oninput="updateEdit()">
                    </div>
                </div>
                
                <div class="filter-buttons">
                    <button class="filter-btn active" onclick="applyFilter('original')">原图</button>
                    <button class="filter-btn" onclick="applyFilter('grayscale')">黑白</button>
                    <button class="filter-btn" onclick="applyFilter('sepia')">复古</button>
                    <button class="filter-btn" onclick="applyFilter('invert')">反相</button>
                    <button class="filter-btn" onclick="applyFilter('blur')">模糊</button>
                </div>
            </div>
        </div>
        
        <!-- 预览结果页面 -->
        <div id="preview-page" class="page">
            <div class="header">
                <button class="back-btn" onclick="goBack()">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                        <path d="M15 18L9 12L15 6" stroke="#333" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                </button>
                <h1>预览打印</h1>
                <div style="width: 40px;"></div>
            </div>
            
            <div class="content">
                <div class="preview-container">
                    <div class="preview-frame">
                        <img id="preview-image" class="preview-image">
                    </div>
                </div>
                
                <div class="preview-info">
                    <p>照片尺寸: 1024 × 1024</p>
                    <p>打印质量: 高清</p>
                    <p>纸张类型: 6寸相纸</p>
                </div>
                
                <div class="preview-buttons">
                    <button class="reedit-btn" onclick="goToEditFromPreview()">
                        重新编辑
                    </button>
                    <button class="print-final-btn" onclick="printPhoto()">
                        传输打印
                    </button>
                </div>
            </div>
        </div>
        
        <!-- 底部导航栏 -->
        <div class="bottom-nav">
            <div class="nav-item" onclick="navTo('cloud')">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                    <path d="M18 10h-1.26A8 8 0 1 0 9 20h9a5 5 0 0 0 0-10z" stroke="#999" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <span>云相册</span>
            </div>
            <div class="nav-item active" onclick="navTo('polaroid')">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                    <rect x="3" y="3" width="18" height="18" rx="2" stroke="#FF69B4" stroke-width="2"/>
                    <circle cx="12" cy="12" r="5" fill="#FF69B4"/>
                </svg>
                <span>拍立得</span>
            </div>
            <div class="nav-item" onclick="navTo('my')">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" stroke="#999" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <circle cx="12" cy="7" r="4" stroke="#999" stroke-width="2"/>
                </svg>
                <span>我的</span>
            </div>
        </div>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
