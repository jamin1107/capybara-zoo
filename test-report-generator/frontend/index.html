<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试报告生成器</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <div class="page-header">
            <h1>📄 测试报告生成器</h1>
            <p class="subtitle">填写以下信息，一键生成专业的Word格式测试报告</p>
        </div>

        <div class="form-container">
            <!-- 项目基本信息 -->
            <div class="form-section">
                <h2>📋 项目基本信息</h2>
                <div class="form-row">
                    <div class="form-group">
                        <label>项目名称 <span class="required">*</span></label>
                        <input type="text" id="projectName" placeholder="请输入项目名称">
                    </div>
                    <div class="form-group">
                        <label>测试版本 <span class="required">*</span></label>
                        <input type="text" id="testVersion" placeholder="例如：v1.0.0">
                    </div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>测试周期</label>
                        <input type="text" id="testPeriod" placeholder="例如：2024-01-01 至 2024-01-10">
                    </div>
                    <div class="form-group">
                        <label>测试人员</label>
                        <input type="text" id="testers" placeholder="请输入测试人员姓名">
                    </div>
                </div>
            </div>

            <!-- 测试环境 -->
            <div class="form-section">
                <h2>🖥️ 测试环境</h2>
                <div class="form-group">
                    <label>测试环境描述</label>
                    <textarea id="testEnvironment" rows="4" placeholder="例如：&#10;- 操作系统：Windows 10 / macOS 14&#10;- 浏览器：Chrome 120.0&#10;- 测试环境：预发布环境"></textarea>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>测试类型</label>
                        <input type="text" id="testType" placeholder="例如：功能测试、回归测试、接口测试">
                    </div>
                    <div class="form-group">
                        <label>测试范围与模块</label>
                        <input type="text" id="testScope" placeholder="例如：用户登录、商品浏览、购物车">
                    </div>
                </div>
            </div>

            <!-- 用例执行数据 -->
            <div class="form-section">
                <h2>📊 用例执行数据</h2>
                <div class="form-grid">
                    <div class="form-group">
                        <label>总用例数</label>
                        <input type="number" id="totalCases" placeholder="0" min="0">
                    </div>
                    <div class="form-group">
                        <label>通过数</label>
                        <input type="number" id="passedCases" placeholder="0" min="0">
                    </div>
                    <div class="form-group">
                        <label>失败数</label>
                        <input type="number" id="failedCases" placeholder="0" min="0">
                    </div>
                    <div class="form-group">
                        <label>阻塞数</label>
                        <input type="number" id="blockedCases" placeholder="0" min="0">
                    </div>
                    <div class="form-group">
                        <label>未执行数</label>
                        <input type="number" id="notExecutedCases" placeholder="0" min="0">
                    </div>
                </div>
            </div>

            <!-- 缺陷数据 -->
            <div class="form-section">
                <h2>🐛 缺陷数据</h2>
                <div class="form-grid">
                    <div class="form-group">
                        <label>总缺陷数</label>
                        <input type="number" id="totalDefects" placeholder="0" min="0">
                    </div>
                    <div class="form-group critical">
                        <label>致命</label>
                        <input type="number" id="criticalDefects" placeholder="0" min="0">
                    </div>
                    <div class="form-group major">
                        <label>严重</label>
                        <input type="number" id="majorDefects" placeholder="0" min="0">
                    </div>
                    <div class="form-group normal">
                        <label>一般</label>
                        <input type="number" id="normalDefects" placeholder="0" min="0">
                    </div>
                    <div class="form-group minor">
                        <label>轻微</label>
                        <input type="number" id="minorDefects" placeholder="0" min="0">
                    </div>
                </div>
            </div>

            <!-- 遗留问题与结论 -->
            <div class="form-section">
                <h2>📝 遗留问题与结论</h2>
                <div class="form-group">
                    <label>遗留问题</label>
                    <textarea id="remainingIssues" rows="4" placeholder="请描述尚未解决的问题"></textarea>
                </div>
                <div class="form-group">
                    <label>测试结论 / 上线建议</label>
                    <textarea id="testConclusion" rows="4" placeholder="例如：&#10;□ 允许上线&#10;□ 有条件上线（需解决以下问题：...）&#10;□ 不建议上线"></textarea>
                </div>
            </div>
        </div>

        <div class="action-section">
            <button class="btn btn-primary btn-large" onclick="generateTestReport()" id="generate-btn">
                <span class="icon">📄</span> 生成Word测试报告
            </button>
        </div>

        <!-- 下载结果 -->
        <div id="result-section" class="result-section" style="display: none;">
            <div class="result-card">
                <div class="result-icon">✅</div>
                <h3>报告生成成功！</h3>
                <p>点击下方按钮下载测试报告：</p>
                <a id="download-link" class="btn btn-success" download style="text-decoration: none;">
                    <span class="icon">📥</span> 下载测试报告
                </a>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
