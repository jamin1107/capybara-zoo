<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI测试用例生成器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', 'Hiragino Sans GB', sans-serif;
            background: linear-gradient(180deg, #f5e6d3 0%, #e8d4c0 50%, #dcc4a8 100%);
            min-height: 100vh;
            padding: 40px 20px;
            position: relative;
            overflow-x: hidden;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(ellipse at 30% 20%, rgba(255, 200, 150, 0.3) 0%, transparent 50%),
                        radial-gradient(ellipse at 70% 80%, rgba(200, 180, 160, 0.3) 0%, transparent 50%);
            pointer-events: none;
            z-index: 1;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: linear-gradient(145deg, #fff9f0 0%, #faf0e6 100%);
            border-radius: 30px;
            border: none;
            box-shadow:
                0 20px 60px rgba(139, 90, 43, 0.2),
                0 10px 30px rgba(139, 90, 43, 0.1),
                inset 0 2px 0 rgba(255, 255, 255, 0.8);
            overflow: hidden;
            position: relative;
            z-index: 2;
        }
        header {
            background: linear-gradient(135deg, #c4a574 0%, #b8956a 50%, #a67c52 100%);
            color: #fff;
            padding: 40px;
            text-align: center;
            position: relative;
            border-bottom: none;
        }
        header::after {
            content: '';
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
            width: 80px;
            height: 40px;
            background: linear-gradient(180deg, #c4a574 0%, transparent 100%);
            border-radius: 0 0 40px 40px;
        }
        header h1 {
            font-size: 2.2em;
            margin-bottom: 10px;
            text-shadow: 0 2px 4px rgba(139, 90, 43, 0.3);
            letter-spacing: 2px;
            font-weight: 500;
        }
        header p {
            font-size: 1.05em;
            color: rgba(255, 255, 255, 0.95);
            font-weight: 300;
        }
        main {
            padding: 50px 40px;
        }
        .upload-area {
            border: 3px dashed #c4a574;
            border-radius: 25px;
            padding: 60px 40px;
            text-align: center;
            background: linear-gradient(145deg, #fff9f0 0%, #f5ebe0 100%);
            transition: all 0.4s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        .upload-area:hover {
            border-color: #a67c52;
            background: linear-gradient(145deg, #ffffff 0%, #faf5ed 100%);
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(139, 90, 43, 0.15);
        }
        .upload-area.dragover {
            background: linear-gradient(145deg, #f5ebe0 0%, #efe0d0 100%);
            border-color: #8b5a2b;
        }
        .upload-icon {
            font-size: 4.5em;
            margin-bottom: 20px;
            filter: drop-shadow(0 4px 8px rgba(139, 90, 43, 0.2));
        }
        .upload-area h2 {
            color: #8b5a2b;
            margin-bottom: 10px;
            font-weight: 500;
            font-size: 1.4em;
        }
        .upload-area p {
            color: #a67c52;
            margin-bottom: 25px;
            font-size: 0.95em;
        }
        .file-input {
            display: none;
        }
        .btn {
            padding: 14px 35px;
            border: none;
            border-radius: 50px;
            font-size: 1.05em;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }
        .btn-primary {
            background: linear-gradient(135deg, #c4a574 0%, #b8956a 100%);
            color: #fff;
            box-shadow: 0 6px 20px rgba(139, 90, 43, 0.3);
        }
        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(139, 90, 43, 0.4);
        }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .btn-large {
            width: 100%;
            padding: 18px;
            font-size: 1.15em;
            border-radius: 15px;
        }
        .btn-success {
            background: linear-gradient(135deg, #8fbc8f 0%, #7caa7caa 100%);
            color: #fff;
            box-shadow: 0 6px 20px rgba(143, 188, 143, 0.4);
        }
        .btn-success:hover {
            background: linear-gradient(135deg, #98d198 0%, #8bc28b 100%);
            box-shadow: 0 10px 30px rgba(143, 188, 143, 0.5);
            transform: translateY(-2px);
        }
        .file-info {
            display: none;
            align-items: center;
            justify-content: space-between;
            background: linear-gradient(145deg, #fff9f0 0%, #f5ebe0 100%);
            border: 2px solid #e0d0c0;
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
            box-shadow: 0 4px 15px rgba(139, 90, 43, 0.1);
        }
        .file-details {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .file-icon {
            font-size: 2em;
        }
        .file-name {
            font-weight: 500;
            color: #8b5a2b;
            font-size: 1.05em;
        }
        .file-size {
            color: #a67c52;
            font-size: 0.9em;
        }
        .btn-remove {
            padding: 8px 18px;
            background: transparent;
            color: #c4a574;
            border: 2px solid #c4a574;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.9em;
            transition: all 0.3s ease;
        }
        .btn-remove:hover {
            background: #c4a574;
            color: #fff;
        }
        .result-area {
            display: none;
            margin-top: 30px;
            background: linear-gradient(145deg, #fff9f0 0%, #faf5ed 100%);
            border-radius: 20px;
            padding: 30px;
            border: 2px solid #e8dcc8;
            box-shadow: 0 8px 30px rgba(139, 90, 43, 0.1);
        }
        .result-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            flex-wrap: wrap;
            gap: 15px;
        }
        .result-header h3 {
            color: #8b5a2b;
            font-size: 1.3em;
            font-weight: 500;
        }
        .btn-download {
            padding: 12px 28px;
            background: linear-gradient(135deg, #8fbc8f 0%, #7caa7c 100%);
            color: #fff;
            border: none;
            border-radius: 25px;
            font-size: 0.95em;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(143, 188, 143, 0.4);
        }
        .btn-download:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(143, 188, 143, 0.5);
        }
        .test-cases-list {
            max-height: 500px;
            overflow-y: auto;
            padding-right: 10px;
        }
        .test-cases-list::-webkit-scrollbar {
            width: 8px;
        }
        .test-cases-list::-webkit-scrollbar-track {
            background: rgba(196, 165, 116, 0.1);
            border-radius: 4px;
        }
        .test-cases-list::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #c4a574, #b8956a);
            border-radius: 4px;
        }
        .test-case-item {
            background: linear-gradient(145deg, #ffffff 0%, #faf5ed 100%);
            border-left: 5px solid #c4a574;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 15px;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            box-shadow: 0 3px 10px rgba(139, 90, 43, 0.08);
        }
        .test-case-item:hover {
            border-left-color: #8b5a2b;
            box-shadow: 0 8px 25px rgba(139, 90, 43, 0.15);
            transform: translateX(5px);
        }
        .test-case-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        .test-case-id {
            font-weight: 600;
            color: #8b5a2b;
            font-size: 1.1em;
        }
        .priority-tag {
            padding: 5px 14px;
            border-radius: 20px;
            font-size: 0.8em;
            font-weight: 500;
        }
        .priority-high {
            background: linear-gradient(135deg, #e8a090, #dba090);
            color: #fff;
        }
        .priority-medium {
            background: linear-gradient(135deg, #f0d090, #e8c880);
            color: #8b5a2b;
        }
        .priority-low {
            background: linear-gradient(135deg, #a8d8a8, #98c898);
            color: #fff;
        }
        .test-case-scenario {
            font-weight: 500;
            color: #a67c52;
            font-size: 1.05em;
            margin-bottom: 8px;
        }
        .test-case-meta {
            font-size: 0.9em;
            color: #c4a574;
            margin-bottom: 10px;
        }
        .test-case-detail {
            background: rgba(245, 235, 224, 0.6);
            border-radius: 10px;
            padding: 15px;
            font-size: 0.95em;
            line-height: 1.7;
            border: 1px solid rgba(196, 165, 116, 0.2);
        }
        .test-case-detail p {
            margin: 8px 0;
            color: #6b5344;
        }
        .test-case-detail strong {
            color: #8b5a2b;
        }
        footer {
            background: linear-gradient(135deg, #e8dcc8 0%, #ddd0c0 100%);
            padding: 25px;
            text-align: center;
            color: #a67c52;
            border-top: none;
        }
        .loading {
            display: none;
            text-align: center;
            padding: 50px;
        }
        .spinner {
            width: 55px;
            height: 55px;
            border: 4px solid rgba(196, 165, 116, 0.2);
            border-radius: 50%;
            border-top-color: #c4a574;
            border-right-color: #b8956a;
            animation: spin 1.2s linear infinite;
            margin: 0 auto 25px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .loading p {
            color: #8b5a2b;
            font-size: 1.1em;
        }
        .toast {
            position: fixed;
            top: 25px;
            right: 25px;
            background: linear-gradient(145deg, #fff9f0 0%, #faf0e6 100%);
            color: #8b5a2b;
            padding: 16px 28px;
            border-radius: 15px;
            border: 2px solid #c4a574;
            box-shadow: 0 8px 30px rgba(139, 90, 43, 0.2);
            transform: translateX(450px);
            transition: transform 0.4s ease;
            z-index: 1000;
            font-weight: 500;
        }
        .toast.show {
            transform: translateX(0);
        }
        .toast.success {
            border-color: #8fbc8f;
            background: linear-gradient(145deg, #f0fff0 0%, #e8f5e8 100%);
            color: #5a8a5a;
        }
        .toast.error {
            border-color: #d4a090;
            background: linear-gradient(145deg, #fff5f0 0%, #f8ebe5 100%);
            color: #a06050;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🟤 AI测试用例生成器</h1>
            <p>上传需求文档，智能生成测试用例</p>
        </header>

        <main>
            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">📄</div>
                <h2>上传需求文档</h2>
                <p>支持 .docx、.doc 和 .pdf 格式</p>
                <button class="btn btn-primary" id="selectFileBtn">选择文件</button>
                <input type="file" id="fileInput" class="file-input" accept=".docx,.doc,.pdf">
            </div>

            <div class="file-info" id="fileInfo">
                <div class="file-details">
                    <span class="file-icon">📎</span>
                    <div>
                        <div class="file-name" id="fileName"></div>
                        <div class="file-size" id="fileSize"></div>
                    </div>
                </div>
                <button class="btn-remove" id="removeFileBtn">移除</button>
            </div>

            <div style="margin-top: 20px;">
                <button class="btn btn-primary btn-large" id="generateBtn" disabled>
                    🚀 AI生成测试用例
                </button>
            </div>

            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>AI正在分析文档并生成测试用例...</p>
            </div>

            <div class="result-area" id="resultArea">
                <div class="result-header">
                    <h3>📋 生成的测试用例（共 <span id="caseCount">0</span> 条）</h3>
                    <button class="btn-download" id="downloadBtn">📥 下载CSV</button>
                </div>
                <div class="test-cases-list" id="testCasesList"></div>
            </div>
        </main>

        <footer>
            <p>基于测试用例生成规范设计 | 支持docx/doc/pdf文档解析</p>
        </footer>
    </div>

    <div class="toast" id="toast">
        <span class="toast-message"></span>
    </div>

    <script>
        let selectedFile = null;
        let generatedTestCases = [];

        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const selectFileBtn = document.getElementById('selectFileBtn');
        const fileInfo = document.getElementById('fileInfo');
        const fileName = document.getElementById('fileName');
        const fileSize = document.getElementById('fileSize');
        const removeFileBtn = document.getElementById('removeFileBtn');
        const generateBtn = document.getElementById('generateBtn');
        const loading = document.getElementById('loading');
        const resultArea = document.getElementById('resultArea');
        const caseCount = document.getElementById('caseCount');
        const testCasesList = document.getElementById('testCasesList');
        const downloadBtn = document.getElementById('downloadBtn');

        selectFileBtn.addEventListener('click', () => fileInput.click());

        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            if (e.dataTransfer.files.length > 0) {
                handleFile(e.dataTransfer.files[0]);
            }
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });

        removeFileBtn.addEventListener('click', () => {
            selectedFile = null;
            fileInput.value = '';
            fileInfo.style.display = 'none';
            generateBtn.disabled = true;
            resultArea.style.display = 'none';
        });

        generateBtn.addEventListener('click', generateTestCases);
        downloadBtn.addEventListener('click', downloadCSV);

        function handleFile(file) {
            const validTypes = [
                'application/vnd.openxmlformats-officedocument.wordprocessingml.document',
                'application/msword',
                'application/pdf'
            ];

            if (!validTypes.includes(file.type) &&
                !file.name.endsWith('.docx') &&
                !file.name.endsWith('.doc') &&
                !file.name.endsWith('.pdf')) {
                showToast('请上传 .docx、.doc 或 .pdf 格式的文件', 'error');
                return;
            }

            selectedFile = file;
            fileName.textContent = file.name;
            fileSize.textContent = formatFileSize(file.size);
            fileInfo.style.display = 'flex';
            generateBtn.disabled = false;
            resultArea.style.display = 'none';

            showToast('文件上传成功', 'success');
        }

        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return Math.round(bytes / Math.pow(k, i) * 100) / 100 + ' ' + sizes[i];
        }

        async function generateTestCases() {
            if (!selectedFile) {
                showToast('请先上传需求文档', 'error');
                return;
            }

            loading.style.display = 'block';
            generateBtn.disabled = true;
            resultArea.style.display = 'none';

            try {
                const formData = new FormData();
                formData.append('file', selectedFile);

                const apiUrl = window.location.origin;
                const response = await fetch(`${apiUrl}/api/generate`, {
                    method: 'POST',
                    body: formData
                });

                const data = await response.json();

                if (data.success) {
                    generatedTestCases = data.test_cases;
                    displayTestCases(generatedTestCases);
                    caseCount.textContent = generatedTestCases.length;
                    resultArea.style.display = 'block';
                    showToast(`成功生成 ${generatedTestCases.length} 条测试用例`, 'success');
                } else {
                    throw new Error(data.error);
                }
            } catch (error) {
                console.error('Error:', error);
                showToast('请求失败: ' + error.message, 'error');
                loading.style.display = 'none';
                generateBtn.disabled = false;
            } finally {
                loading.style.display = 'none';
                generateBtn.disabled = false;
            }
        }

        function generateMockData() {
            return [
                {
                    id: 'TC-001',
                    scenario: '页面加载显示测试',
                    preconditions: '用户已登录，网络正常',
                    steps: '1. 访问目标页面\n2. 观察页面加载过程\n3. 检查页面元素完整性',
                    expected: '1. 页面正常加载，无白屏\n2. 所有UI元素按设计显示\n3. 加载状态提示正常',
                    priority: '高',
                    notes: '功能测试',
                    result: '待测试'
                },
                {
                    id: 'TC-002',
                    scenario: '按钮点击交互测试',
                    preconditions: '在目标页面',
                    steps: '1. 点击主按钮\n2. 观察交互反馈\n3. 检查功能响应',
                    expected: '1. 按钮点击有视觉反馈\n2. 交互响应及时\n3. 功能正常执行',
                    priority: '高',
                    notes: '功能测试',
                    result: '待测试'
                },
                {
                    id: 'TC-003',
                    scenario: '输入框功能测试',
                    preconditions: '在输入页面',
                    steps: '1. 点击输入框获取焦点\n2. 输入测试内容\n3. 检查输入显示',
                    expected: '1. 输入框获取焦点正常\n2. 输入内容正确显示\n3. 输入验证正常',
                    priority: '高',
                    notes: '功能测试',
                    result: '待测试'
                },
                {
                    id: 'TC-004',
                    scenario: '页面UI布局检查',
                    preconditions: '在目标页面',
                    steps: '1. 检查页面整体布局\n2. 检查元素位置\n3. 检查间距和对齐',
                    expected: '1. 布局符合设计要求\n2. 元素位置正确\n3. 间距均匀对齐整齐',
                    priority: '中',
                    notes: 'UI测试',
                    result: '待测试'
                },
                {
                    id: 'TC-005',
                    scenario: '安卓系统兼容性测试',
                    preconditions: '使用安卓设备',
                    steps: '1. 在安卓系统测试\n2. 检查功能是否正常\n3. 检查UI显示',
                    expected: '1. 功能正常工作\n2. UI显示符合设计\n3. 交互流畅无异常',
                    priority: '高',
                    notes: '兼容性测试',
                    result: '待测试'
                },
                {
                    id: 'TC-006',
                    scenario: 'iOS系统兼容性测试',
                    preconditions: '使用iOS设备',
                    steps: '1. 在iOS系统测试\n2. 检查功能是否正常\n3. 检查UI显示',
                    expected: '1. 功能正常工作\n2. UI显示符合设计\n3. 交互流畅无异常',
                    priority: '高',
                    notes: '兼容性测试',
                    result: '待测试'
                },
                {
                    id: 'TC-007',
                    scenario: '网络异常处理测试',
                    preconditions: '断开网络连接',
                    steps: '1. 尝试操作\n2. 观察错误提示\n3. 恢复网络重试',
                    expected: '1. 有网络异常提示\n2. 提示信息友好\n3. 恢复后可正常重试',
                    priority: '高',
                    notes: '异常测试',
                    result: '待测试'
                },
                {
                    id: 'TC-008',
                    scenario: '最大长度输入测试',
                    preconditions: '在输入页面',
                    steps: '1. 输入达到最大长度\n2. 尝试继续输入\n3. 检查限制效果',
                    expected: '1. 最大长度输入成功\n2. 超出部分被截断\n3. 有长度提示',
                    priority: '中',
                    notes: '边界测试',
                    result: '待测试'
                }
            ];
        }

        function displayTestCases(testCases) {
            testCasesList.innerHTML = '';

            testCases.forEach(tc => {
                const item = document.createElement('div');
                item.className = 'test-case-item';
                item.innerHTML = `
                    <div class="test-case-header">
                        <span class="test-case-id">${tc.id}</span>
                        <span class="priority-tag priority-${tc.priority === '高' ? 'high' : tc.priority === '中' ? 'medium' : 'low'}">
                            ${tc.priority}
                        </span>
                    </div>
                    <div class="test-case-scenario">${tc.scenario}</div>
                    <div class="test-case-meta">📝 ${tc.notes} | 结果: ${tc.result || '待测试'}</div>
                    <div class="test-case-detail">
                        <p><strong>前置条件：</strong>${tc.preconditions}</p>
                        <p><strong>测试步骤：</strong></p>
                        <p>${tc.steps.replace(/\n/g, '<br>')}</p>
                        <p><strong>预期结果：</strong></p>
                        <p>${tc.expected.replace(/\n/g, '<br>')}</p>
                    </div>
                `;
                testCasesList.appendChild(item);
            });
        }

        function downloadCSV() {
            if (generatedTestCases.length === 0) {
                showToast('没有可下载的测试用例', 'error');
                return;
            }

            const headers = ['用例ID', '测试场景', '前置条件', '测试步骤', '预期结果', '优先级', '备注', '结果'];
            const rows = generatedTestCases.map(tc => [
                tc.id,
                tc.scenario,
                tc.preconditions,
                tc.steps.replace(/<br\s*\/?>/gi, '\n'),
                tc.expected.replace(/<br\s*\/?>/gi, '\n'),
                tc.priority,
                tc.notes,
                tc.result || '待测试'
            ]);

            let csvContent = '\ufeff';
            csvContent += headers.join(',') + '\n';

            rows.forEach(row => {
                csvContent += row.map(cell => `"${cell.replace(/"/g, '""')}"`).join(',') + '\n';
            });

            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);
            link.setAttribute('href', url);
            link.setAttribute('download', `测试用例_${new Date().toLocaleDateString().replace(/\//g, '-')}.csv`);
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

            showToast('CSV文件下载成功', 'success');
        }

        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            toast.className = 'toast ' + type;
            toast.querySelector('.toast-message').textContent = message;
            toast.classList.add('show');

            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }
    </script>
</body>
</html>
