<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>测试用例管理系统</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-container">
        <!-- 顶部导航 -->
        <nav class="navbar">
            <div class="nav-item active" onclick="switchTab('management')">用例管理</div>
            <div class="nav-item" onclick="switchTab('execution')">用例执行</div>
        </nav>

        <!-- 用例管理页面 -->
        <div id="management-page" class="page active">
            <div class="page-header">
                <h2>用例管理</h2>
                <button class="btn btn-primary" onclick="showAddModal()">
                    <span class="icon">+</span>新增用例
                </button>
            </div>

            <div class="test-case-list" id="test-case-list">
                <!-- 用例列表将在这里动态生成 -->
            </div>
        </div>

        <!-- 用例执行页面 -->
        <div id="execution-page" class="page">
            <div class="page-header">
                <h2>用例执行</h2>
                <div class="header-actions">
                    <button class="btn btn-primary" onclick="showAddToExecutionModal()">
                        <span class="icon">+</span>添加用例
                    </button>
                </div>
            </div>

            <div class="execution-list" id="execution-list">
                <!-- 执行列表将在这里动态生成 -->
            </div>

            <div class="execution-footer">
                <button class="btn btn-success btn-large" onclick="handleExecuteAll()" id="execute-btn">
                    执行全部用例
                </button>
            </div>
        </div>
    </div>

    <!-- 新增/编辑用例弹窗 -->
    <div class="modal" id="add-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-title">新增用例</h3>
                <button class="close-btn" onclick="closeModal('add-modal')">&times;</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label>用例名称</label>
                    <input type="text" id="case-name" placeholder="请输入用例名称">
                </div>
                <div class="form-group">
                    <label>自然语言描述</label>
                    <textarea id="case-description" rows="8" placeholder="请用自然语言描述测试步骤和预期结果"></textarea>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('add-modal')">取消</button>
                <button class="btn btn-primary" onclick="handleSaveTestCase()">保存</button>
            </div>
        </div>
    </div>

    <!-- 添加用例到执行列表弹窗 -->
    <div class="modal" id="add-execution-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>添加用例到执行列表</h3>
                <button class="close-btn" onclick="closeModal('add-execution-modal')">&times;</button>
            </div>
            <div class="modal-body">
                <div class="select-case-list" id="select-case-list">
                    <!-- 可选的用例将在这里动态生成 -->
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('add-execution-modal')">取消</button>
                <button class="btn btn-primary" onclick="handleAddToExecutionList()">确定</button>
            </div>
        </div>
    </div>

    <!-- 查看Midscene格式弹窗 -->
    <div class="modal" id="midscene-modal">
        <div class="modal-content modal-large">
            <div class="modal-header">
                <h3>Midscene格式预览</h3>
                <button class="close-btn" onclick="closeModal('midscene-modal')">&times;</button>
            </div>
            <div class="modal-body">
                <pre id="midscene-content" class="code-preview"></pre>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal('midscene-modal')">关闭</button>
                <button class="btn btn-primary" onclick="copyMidsceneFormat()">复制</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
